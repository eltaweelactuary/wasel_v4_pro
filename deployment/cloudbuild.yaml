# Wasel v4 Pro: GCP Cloud Build Config
# Usage: gcloud builds submit --config deployment/cloudbuild.yaml

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/wasel-v4-pro', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wasel-v4-pro']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wasel-v4-pro'
      - '--image=gcr.io/$PROJECT_ID/wasel-v4-pro'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--port=8501'
      - '--timeout=300'

images:
  - 'gcr.io/$PROJECT_ID/wasel-v4-pro'
